<!DOCTYPE html>
<html>
<head>
    <title>Asistencia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0b2f35;
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        .hero-pc,
        .hero-mobile {
            width: 100%;
        }

        .hero-pc img,
        .hero-mobile img {
            width: 100%;
            display: block;
        }

        .hero-mobile {
            display: none;
        }

        .contenedor {
            width: 92%;
            max-width: 480px;
            margin: -40px auto 30px auto;
            background: rgba(255, 255, 255, 0.92);
            color: #123;
            padding: 22px;
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        #contador {
            font-size: 18px;
            margin-bottom: 15px;
            color: #0b686f;
        }

        input {
            font-size: 18px;
            padding: 14px;
            width: 100%;
            margin: 12px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus {
            border-color: #37bbca;
        }

        button {
            font-size: 17px;
            margin: 6px 0;
            padding: 13px;
            width: 100%;
            border-radius: 12px;
            border: none;
            background: #ffffff;
            color: #123;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        button:hover {
            background: #01ff0e;
            color: black;
            cursor: pointer;
        }

        #mensaje {
            font-size: 20px;
            margin-top: 18px;
            color: #0b8f36;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .hero-pc {
                display: none;
            }

            .hero-mobile {
                display: block;
            }

            .contenedor {
                margin: -70px auto 25px auto;
                padding: 18px;
                border-radius: 20px;
            }

            h1 {
                font-size: 21px;
            }

            input {
                font-size: 17px;
            }

            button {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="hero-pc">
    <img src="/static/portada_horizontal.png" alt="Bienvenida">
</div>

<div class="hero-mobile">
    <img src="/static/portada_vertical.png" alt="Bienvenida">
</div>

<div class="contenedor">
    <h1>Registro de Asistencia</h1>

    <h2 id="contador">Asistentes: 0</h2>

    <input type="text" id="buscador" placeholder="Escribe tu nombre..." onkeyup="buscar()">

    <div id="resultados"></div>

    <h2 id="mensaje"></h2>
</div>

<script>
let EVENTO_ID = null;

async function obtenerEvento() {
    let res = await fetch("/evento/activo");
    let data = await res.json();

    EVENTO_ID = data.evento_id;

    actualizarContador();
    setInterval(actualizarContador, 2000);
}

async function buscar() {
    let texto = document.getElementById("buscador").value;

    if (texto.length < 2) {
        document.getElementById("resultados").innerHTML = "";
        return;
    }

    let res = await fetch(`/buscar?nombre=${texto}`);
    let data = await res.json();

    let html = "";

    data.forEach(j => {
        html += `<button onclick="registrar(${j.id}, '${j.nombre}')">${j.nombre}</button>`;
    });

    document.getElementById("resultados").innerHTML = html;
}

async function registrar(id, nombre) {
    if (!EVENTO_ID) {
        document.getElementById("mensaje").innerText = "Cargando evento, intenta de nuevo...";
        return;
    }

    let res = await fetch(`/asistencia_manual?joven_id=${id}&evento_id=${EVENTO_ID}`, {
        method: "POST"
    });

    let data = await res.json();

    document.getElementById("mensaje").innerText =
        "✔ " + nombre + " registrado correctamente";

    document.getElementById("buscador").value = "";
    document.getElementById("resultados").innerHTML = "";

    actualizarContador();
}

async function actualizarContador() {
    if (!EVENTO_ID) return;

    let res = await fetch(`/evento/${EVENTO_ID}/conteo`);
    let data = await res.json();

    document.getElementById("contador").innerText =
        "Asistentes: " + data.asistentes;
}

obtenerEvento();
</script>

</body>
</html>
