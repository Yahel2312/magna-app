<!DOCTYPE html>
<html>
<head>
    <title>Asistencia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0b2f35;
    color: white;
    margin: 0;
    min-height: 100vh;

    position: relative;
}

        .hero-pc,
        .hero-mobile {
            width: 100%;
        }

        .hero-pc img,
        .hero-mobile img {
            width: 100%;
            display: block;
        }

        .hero-mobile {
            display: none;
        }

       .contenedor {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 50%;
    max-width: 620px;
    z-index: 10;
}
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        #contador {
            font-size: 18px;
            margin-bottom: 15px;
            color: #0b686f;
        }

      input {
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    padding: 12px;
    width: 100%;

    border-radius: 8px;
    border: none;
    background: rgba(255, 255, 255, 0.65);
    color: black;
}

input::placeholder {
    color: black;
    opacity: 1;
    font-weight: bold;
}

      button {
    font-size: 17px;
    padding: 13px;
    width: 100%;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: white;
    color: #123;
}

        button:hover {
            background: #01ff0e;
            color: black;
            cursor: pointer;
        }

        #mensaje {
            font-size: 20px;
            margin-top: 18px;
            color: #080600;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
    .hero-pc {
        display: none;
    }

    .hero-mobile {
        display: block;
    }

    .contenedor {
        top: 24%;
        width: 60%;
        max-width: 360px;
        padding: 0;
    }

    h1 {
        font-size: 21px;
    }

    input {
        font-size: 17px;
    }

    button {
        font-size: 16px;
    }
}
    </style>
</head>

<body>

<div class="hero-pc">
    <img src="/static/portada_horizontal.png" alt="Bienvenida">
</div>

<div class="hero-mobile">
    <img src="/static/portada_vertical.png" alt="Bienvenida">
</div>

<div class="contenedor">

    <input type="text" id="buscador" placeholder="Escribe tu nombre..." onkeyup="buscar()">

    <div id="resultados"></div>

    <h2 id="mensaje"></h2>
</div>

<script>
let EVENTO_ID = null;

async function obtenerEvento() {
    let res = await fetch("/evento/activo");
    let data = await res.json();

    EVENTO_ID = data.evento_id;

}

async function buscar() {
    let texto = document.getElementById("buscador").value;

    if (texto.length < 2) {
        document.getElementById("resultados").innerHTML = "";
        return;
    }

    let res = await fetch(`/buscar?nombre=${texto}`);
    let data = await res.json();

    let html = "";

    data.forEach(j => {
        html += `<button onclick="registrar(${j.id}, '${j.nombre}')">${j.nombre}</button>`;
    });

    document.getElementById("resultados").innerHTML = html;
}

async function registrar(id, nombre) {
    if (!EVENTO_ID) {
        document.getElementById("mensaje").innerText = "Cargando evento, intenta de nuevo...";
        return;
    }

    let res = await fetch(`/asistencia_manual?joven_id=${id}&evento_id=${EVENTO_ID}`, {
        method: "POST"
    });

    let data = await res.json();

    document.getElementById("mensaje").innerText =
        "✔ " + nombre + " registrado correctamente";

    document.getElementById("buscador").value = "";
    document.getElementById("resultados").innerHTML = "";

    actualizarContador();
}


obtenerEvento();
</script>

</body>
</html>
